# SonarCloud project configuration.
# Docs: https://docs.sonarcloud.io/advanced-setup/analysis-parameters/

sonar.organization=timo-jakob
sonar.projectKey=timo-jakob_tick-client-snapper
sonar.projectName=tick-client-snapper

# Sources / tests — adjust if your layout is non-standard.
sonar.sources=.
sonar.exclusions=**/node_modules/**,**/vendor/**,**/dist/**,**/.build/**,**/build/**,**/coverage/**,**/*.generated.*
sonar.tests=.
sonar.test.inclusions=**/*.test.*,**/*_test.*,**/test_*.*,**/tests/**,**/__tests__/**,**/*Tests.swift,**/src/test/**

# Coverage report paths (the bootstrap skill keeps only the ones for detected
# languages — keep them all if you're multi-language and they happen to all
# produce reports).
# --- JAVA-START ---------
sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml
# Sonar's Java analyzer needs compiled bytecode to resolve types; point it at
# the Gradle output (`gradle build` produces these in CI before the scan).
sonar.java.binaries=build/classes
# Keep generated sources (protobuf/gRPC stubs, annotation processors) out of
# coverage + analysis so they don't skew the gate.
sonar.coverage.exclusions=**/build/generated/**
sonar.exclusions=**/build/generated/**
sonar.java.test.binaries=build/classes
# --- JAVA-END -----------

# SCM
sonar.scm.provider=git

# Quality gate — assigned in the UI (see SETUP.md), not here.
