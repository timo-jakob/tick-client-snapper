name: gitleaks

# Secret scanning in CI — defense in depth behind the gitleaks pre-commit hook.
# pre-commit can be bypassed; CI can't. No repo should contain secrets.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0   # full history so gitleaks scans every commit on the PR
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is required only for repos owned by a GitHub
          # Organization (set it as a repo secret). Personal repos are free.
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
