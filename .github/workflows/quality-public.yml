# claude-bootstrap: rendered from public/.github/workflows/quality-public.yml.tmpl @ v1.49.3 sha256:769ad856eaf36739ec21f7ed560b2a5ab03bf9bec4ed852fa74f9d2d447ae69c
# (do not edit this line; the maintenance pipeline uses it for drift detection — see #213)
# Quality + security pipeline for PUBLIC repositories.
# Runs on github-hosted runners. Uses SonarCloud for static analysis +
# coverage. Snyk's GitHub App handles SAST + Open Source as PR-time
# advisory checks (and Snyk's auto-Fix-PR flow for OSS — see SETUP.md
# section 2.6). This workflow only runs the `image` channel: Snyk
# container scan on the built Docker image, which the GitHub App can't
# see.
#
# Image publishing: built image is scanned, then pushed to GitHub Container
# Registry (ghcr.io/<owner>/<repo>) on merge to main + release events. The
# scan gates the push — a vulnerable image never reaches the registry.

name: Quality (public)

on:
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - "docs/**"
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - "docs/**"
  release:
    types: [published]
  schedule:
    # Weekly Monday 06:00 UTC — drift detection against newly-disclosed CVEs
    # and updated license categorizations. Matches CodeQL's weekly cadence.
    - cron: "0 6 * * 1"
  workflow_dispatch:

# Least-privilege workflow defaults. Individual jobs may widen as needed:
# the `image` job needs `packages: write` + `id-token: write` for GHCR
# push and cosign keyless signing; nothing else needs anything beyond
# `contents: read`.
permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # --- Tests + coverage per language ----------------------------------------
  # The bootstrap skill keeps only the steps matching detected languages.

  test-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        # Full history: the coverage-floor step runs `diff-cover` against
        # origin/main, which needs a merge base. A shallow (depth-1) checkout
        # only fetches the PR merge commit, so diff-cover fails with
        # "fatal: origin/main...HEAD: no merge base".
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: "temurin"
          java-version: "21"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      - name: Build + test + coverage (Java)
        # `gradle build` runs the full `check` (incl. Spotless when applied)
        # plus tests; jacocoTestReport emits the XML that SonarCloud and
        # diff-cover consume. The wrapper (./gradlew) pins the Gradle version.
        run: ./gradlew --no-daemon build jacocoTestReport

      # Coverage floor — 90% on new code, the load-bearing enforcer on
      # SonarCloud free (mirrors the Python diff-cover gate). diff-cover reads
      # the JaCoCo XML directly. PR-only — push to default has no "new code".
      - name: Install diff-cover (Java — coverage floor)
        if: github.event_name == 'pull_request'
        run: pipx install 'diff-cover>=9'
      - name: Fetch base ref for diff-cover (Java)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags --prune origin \
            "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"
      - name: Coverage floor — 90% on new code (Java)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          diff-cover build/reports/jacoco/test/jacocoTestReport.xml \
            --compare-branch="origin/${BASE_REF}" \
            --fail-under=90 \
            --show-uncovered

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-reports
          path: |
            coverage.xml
            coverage.out
            coverage.lcov
            coverage/lcov.info
            build/reports/jacoco/test/jacocoTestReport.xml
          if-no-files-found: ignore

  # --- SonarCloud -----------------------------------------------------------
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Setup JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: "temurin"
          java-version: "21"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      # The org.sonarqube Gradle plugin runs in-build, so it sees the compiled
      # classes + the JaCoCo XML directly and auto-configures
      # sonar.java.binaries/sources/tests/coverage. `build` runs the tests, which
      # finalize the JaCoCo report; `sonar` then uploads the analysis. A
      # standalone scanner-CLI job can't see build/classes and fails on Java.
      - name: Build + analyze (SonarCloud via Gradle plugin)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew --no-daemon build sonar

  # --- Snyk source-code + open-source scans -----------------------------------
  # NOT a CI job. Snyk runs via the **Snyk GitHub integration** (App), never
  # against SNYK_TOKEN in CI — a `snyk test`/`snyk code test` job would be
  # redundant with the integration and double-count the monthly test quota.
  #
  # Two integration features (configured in the Snyk Web UI — see SETUP.md
  # §2.5–2.6) do the work, and they are deliberately split:
  #
  #   1. Pull request status checks
  #      Snyk → Settings → Integrations → GitHub → Pull request status checks
  #        Open Source security and licenses → DISABLE
  #            Third-party CVEs surface and change independently of our code —
  #            a clean release goes vulnerable the moment a new CVE lands — so
  #            they must NOT gate a build. They're handled out-of-band: daily
  #            Snyk monitoring → auto-fix PRs → the maintenance pipeline, plus
  #            Dependabot. (Leaving this ON yields the `security/snyk` check.)
  #        Code analysis                     → DISABLE
  #            SAST on our OWN code is already covered by CodeQL (the required
  #            `analyze (<lang>)` checks). Snyk Code adds no incremental
  #            coverage on the free tier, where its monthly test cap makes
  #            `code/snyk` go ERROR ("Code test limit reached") — and that
  #            advisory legacy status used to silently skip the Claude Approver
  #            (#387). Disabling it drops the `code/snyk` check; CodeQL stays
  #            the SAST gate.
  #
  #   2. Continuous monitoring + Automatic Fix PRs
  #      Daily re-test of the imported target; when a vulnerable dependency has
  #      a known fix, Snyk opens a `snyk-fix-*` PR that the maintenance pipeline
  #      triages alongside Dependabot. This — NOT the PR status checks — is what
  #      produces fix PRs.
  #
  # The `image` job below stays a CI job because the integration only scans the
  # Dockerfile statically — it doesn't build the image and inspect installed
  # packages.

  # --- License compliance (dependencies) ------------------------------------
  # Uses Trivy as an open-source license scanner. Catches deps shipping
  # incompatible licenses (AGPL/SSPL → HIGH severity, blocks CI by default).
  # Policy customizable via trivy.yaml.
  license-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "license"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          format: "table"
          trivy-config: trivy.yaml

  # --- Semgrep (free OSS rules) ---------------------------------------------
  semgrep:
    runs-on: ubuntu-latest
    container:
      # Pinned. Matches the pre-commit hook's semgrep version so local + CI
      # behave identically. Bump in lockstep with `.pre-commit-config.yaml`.
      image: returntocorp/semgrep:1.163.0
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: semgrep ci --config=auto
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}   # optional

  # --- Pre-commit (CI backstop) ---------------------------------------------
  # Catches contributors who bypassed local hooks with `git commit
  # --no-verify` or pushed from a machine without pre-commit installed.
  # Runs the exact same hooks as locally.
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0   # some hooks (gitleaks) want history
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
