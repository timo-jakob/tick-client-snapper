# claude-bootstrap: rendered from languages/java/.github/workflows/release.yml.tmpl @ v1.48.2 sha256:0f959722c0cd8c3afbc8d38585bfa25fa0bcf5bd33e5f56c704e2cf11059787e
# (do not edit this line; the maintenance pipeline uses it for drift detection — see #213)
# Release workflow — build-driven semantic versioning via nebula-release.
#
# The project version is DERIVED from git tags by the nebula.release Gradle
# plugin (no `version = '...'` in build.gradle). This workflow computes the
# next version from the last tag + the chosen semver scope, creates the tag,
# and builds the release — no manual version bump.
#
# The SemVer bump is DERIVED from the Conventional Commits since the last tag
# (scope 'auto', the default) via scripts/derive-release-scope.zsh — so the
# release obeys SemVer automatically, no manual guess. Override the scope only
# to force a specific bump.
#
# Prerequisites: the `nebula.release` plugin applied in build.gradle(.kts) with
# NO hardcoded `version`, and scripts/derive-release-scope.zsh present (both
# shipped by /development:bootstrap — see the Java versioning recommendation in
# SETUP.md / the bootstrap summary). Run it via the Actions tab.

name: Release

on:
  workflow_dispatch:
    inputs:
      scope:
        description: >
          SemVer scope. 'auto' derives it from the Conventional Commits since
          the last tag (breaking -> major, feat -> minor, else patch) — the
          default, so releases obey SemVer automatically. Override only to
          force a specific bump.
        type: choice
        options: ["auto", "patch", "minor", "major"]
        default: "auto"

# Least-privilege default at workflow scope; the release job widens to
# contents: write below (nebula's `final` task pushes the release tag).
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # nebula `final` pushes the release tag
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # nebula derives the version from the FULL tag history.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Configure git identity for the release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Decide the SemVer bump. With 'auto' (the default) the scope is DERIVED
      # from the Conventional Commits since the last tag, so the release obeys
      # SemVer automatically — a breaking change cuts a major, a feat a minor,
      # anything else a patch. An explicit choice overrides the derivation.
      # INPUT_SCOPE goes through env: so the github-context value isn't
      # shell-injected (same posture as the quality workflow's BASE_REF).
      - name: Determine release scope (SemVer)
        id: scope
        env:
          INPUT_SCOPE: ${{ inputs.scope }}
        run: |
          set -e
          if [[ "$INPUT_SCOPE" == "auto" ]]; then
            # The deriver is zsh (project scripting convention); install it on
            # the Linux runner if needed.
            command -v zsh >/dev/null 2>&1 || { sudo apt-get update -qq && sudo apt-get install -y -qq zsh; }
            scope="$(zsh scripts/derive-release-scope.zsh)"
            echo "Derived SemVer scope from conventional commits since the last tag: $scope"
          else
            scope="$INPUT_SCOPE"
            echo "Operator-forced scope: $scope"
          fi
          echo "scope=$scope" >> "$GITHUB_OUTPUT"

      # `final` derives the next version (last tag + scope), tags it, and
      # builds the release.
      - name: Release (nebula final)
        env:
          SCOPE: ${{ steps.scope.outputs.scope }}
        run: ./gradlew --no-daemon final -Prelease.scope="${SCOPE}"
