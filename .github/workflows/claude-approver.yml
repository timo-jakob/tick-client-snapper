# claude-bootstrap: rendered from common/.github/workflows/claude-approver.yml.tmpl @ v1.53.0 sha256:30852188bfa71c1c0947e35a55dbb0097008c545c20d57641083e8deb38e4129
# (do not edit this line; the maintenance pipeline uses it for drift detection — see #213)
# Claude Approver — the final synthesis layer for PR approval.
#
# Runs LAST: the all-green gate waits in-job for every other check on the
# PR's head SHA to complete before evaluating (GitHub Actions has no
# cross-workflow `needs:`, and App-posted checks like SonarCloud/Snyk
# aren't workflows, so waiting is the only reliable ordering primitive —
# see #232). Asks two questions a checker can't:
#   - Risk: given everything is green, what could still go wrong?
#   - Confidence: how sure am I that this PR does what it claims?
#
# Verdict: APPROVE / REQUEST_CHANGES (with hidden JSON the maintenance
# pipeline re-ingests) / COMMENT-with-reservations.
#
# Two-stage pipeline (#232): the `approver-gate` job resolves the PR,
# enforces the policy gates, and waits for all other checks to settle;
# the `approve` job (needs: gate) mints the App token and runs the agent
# only when the gate emits proceed=true. A policy skip ends the gate job
# green with a ::notice:: and the approve job shows as "skipped" — a red
# check now always means a real error, never "nothing to do yet".
#
# Identities provisioned by /development:bootstrap --claude-approver true
# (which calls register-claude-apps.zsh + install-claude-apps.zsh):
#   vars.CLAUDE_APPROVER_APP_ID              App that posts the review
#   secrets.CLAUDE_APPROVER_PRIVATE_KEY      Its private key (PEM)
#   vars.CLAUDE_APPROVER_AUTHOR_ALLOWLIST    JSON array of allowed PR authors
#   secrets.ANTHROPIC_API_KEY                For invoking the java-approver agent
#
# See development/skills/bootstrap/docs/CLAUDE-APPS.md in the plugin family
# for the design and the manual fallback flow.

name: Claude Approver

on:
  # Primary trigger: CI completed, so we have a final green/red state.
  check_suite:
    types: [completed]

  # Backstop trigger: PR opened / pushed-to / un-drafted / reopened. Catches
  # the case where check_suite never fires — e.g. all required workflows
  # were paths-ignored on a doc-only PR, or every check resolved from cache
  # before a suite was created. The gate job waits in-job for the other
  # checks to settle, so this run usually IS the one that evaluates —
  # later check_suite triggers just supersede it via the concurrency
  # group. Without it, all-green-on-open PRs sit unreviewed until someone
  # manually posts /approve. See #198, #232.
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

  # Manual re-trigger via a PR comment: "/approve" or "/approve --dry-run".
  issue_comment:
    types: [created]

  # Re-evaluate when other reviewers act — e.g., a human dismisses our
  # REQUEST_CHANGES after the author pushed a fix.
  pull_request_review:
    types: [submitted, dismissed]

# Default permissions are read-only — the App token (minted in-job) is
# what actually posts the review. GITHUB_TOKEN never gets pull_requests:write.
# Permissions scoped to job level (gate needs none; approve needs contents:read
# for checkout). Workflow-level default is {} so each job declares what it needs.
permissions: {}

# Debounce per PR so two evaluators don't race on the same SHA. With the
# gate job's wait loop (#232) this also keeps exactly one waiter alive:
# each later trigger (a check_suite completing, a new push) cancels the
# stale waiting run and starts a fresh one against the current state.
# The check_suite arm is load-bearing (#232): its payload has no
# github.event.pull_request, so without it those runs fell through to
# the unique run_id and were never debounced — every completing suite
# would have parked its own waiter and they would all have evaluated
# at once when CI settled.
concurrency:
  group: >-
    claude-approver-${{ github.event.pull_request.number ||
    github.event.issue.number ||
    github.event.check_suite.pull_requests[0].number || github.run_id }}
  cancel-in-progress: true

jobs:
  # ==============================================================
  # Stage 1: policy gates + wait-for-CI. Always ends green unless a
  # configuration is genuinely broken (e.g. allowlist variable unset).
  # Each gate either passes (proceed=true cascades to the next step)
  # or skips out with exit 0 and a ::notice:: explaining why — GitHub
  # removed neutral exit codes, so the old `exit 78` recorded as a red
  # failure and polluted every `gh pr checks` consumer (#232). When
  # debugging, the step whose notice fired IS the gate that skipped.
  # ==============================================================
  gate:
    name: approver-gate
    runs-on: ubuntu-latest
    # Covers the wait loop (up to ~30 min) plus the gate API calls.
    timeout-minutes: 40
    permissions:
      pull-requests: read   # gh api repos/.../pulls, gh pr view
      checks: read          # gh api repos/.../commits/.../check-runs
      statuses: read        # gh api repos/.../commits/.../status
    # Entry-point gate for `/approve` PR comments. Anyone with read access
    # can post a PR comment; without this `if:`, a random commenter could
    # fire the workflow on any PR and burn API tokens before the in-job
    # gates skip out. For check_suite and pull_request_review triggers,
    # GitHub itself already requires actor permissions, so this gate is
    # scoped to issue_comment. See #190.
    if: >
      github.event_name != 'issue_comment' ||
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'),
               github.event.comment.author_association)
    outputs:
      number: ${{ steps.pr.outputs.number }}
      dry_run: ${{ steps.pr.outputs.dry_run }}
      head_sha: ${{ steps.green.outputs.head_sha }}
      proceed: ${{ steps.green.outputs.proceed }}
    steps:

      # ============================================================
      # Gate 1: resolve PR number from the trigger
      # ============================================================
      - name: Resolve PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          # Event payloads exposed as env (not embedded in the script body)
          # to keep user-content out of shell expansion — injection-safe.
          CHECK_SUITE_PRS: ${{ toJSON(github.event.check_suite.pull_requests) }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_IS_PR: ${{ github.event.issue.pull_request != null }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          # github.event.pull_request.number is populated for both
          # `pull_request` and `pull_request_review` events; same env var
          # serves both case arms below.
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -e
          dry_run=""
          case "$EVENT_NAME" in
            check_suite)
              number=$(printf '%s' "$CHECK_SUITE_PRS" | jq -r '.[0].number // empty')
              if [ -z "$number" ]; then
                echo "::notice::check_suite has no associated PR; skipping."
                exit 0
              fi
              ;;
            issue_comment)
              if [ "$ISSUE_IS_PR" != "true" ]; then
                echo "::notice::Comment is on a plain issue, not a PR."
                exit 0
              fi
              if ! printf '%s' "$COMMENT_BODY" | grep -qE '^/approve(\s+--dry-run)?\s*$'; then
                echo "::notice::Comment is not /approve."
                exit 0
              fi
              number="$ISSUE_NUMBER"
              if printf '%s' "$COMMENT_BODY" | grep -qE -- '--dry-run'; then
                dry_run="true"
              fi
              ;;
            pull_request|pull_request_review)
              # Both events expose github.event.pull_request.number. The
              # backstop `pull_request` trigger (#198) lands here when no
              # check_suite ever fires for the head SHA (cache-only runs,
              # paths-ignored on doc-only PRs). Gate 5 below waits for the
              # other checks and skips out if the PR ends up not green.
              number="$PULL_REQUEST_NUMBER"
              ;;
            *)
              echo "::notice::Unrecognised event $EVENT_NAME."
              exit 0 ;;
          esac
          echo "number=$number" >> "$GITHUB_OUTPUT"
          echo "dry_run=$dry_run" >> "$GITHUB_OUTPUT"
          echo "proceed=true" >> "$GITHUB_OUTPUT"

      # ============================================================
      # Gate 2: anti-rubber-stamp — PR author must not be the Approver
      # ============================================================
      - name: Anti-rubber-stamp gate
        id: author
        if: steps.pr.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          # `gh pr view` needs to know which repo. No checkout has run yet
          # at this point in the job — `gh` would otherwise look for a
          # local .git directory and exit with "fatal: not a git repository".
          # See #203.
          REPO: ${{ github.repository }}
        run: |
          set -e
          # REST, not `gh pr view` (GraphQL): GraphQL reports App-bot authors
          # as 'app/<slug>' while the allowlist and the self-approval check
          # use the REST/webhook '<slug>[bot]' form. See #221.
          author=$(gh api "repos/$REPO/pulls/$PR_NUMBER" --jq .user.login)
          # Prefix match, not equality: App slugs are globally unique, so
          # the registered Approver's real login is owner-suffixed, e.g.
          # 'claude-approver-<owner>[bot]' — never the generic
          # 'claude-approver[bot]'. See #229.
          case "$author" in
            claude-approver*"[bot]")
              echo "::notice::PR author is the Approver itself — refusing self-approval."
              exit 0
              ;;
          esac
          echo "login=$author" >> "$GITHUB_OUTPUT"
          echo "proceed=true" >> "$GITHUB_OUTPUT"

      # ============================================================
      # Gate 3: author allowlist — Approver only evaluates allowed authors
      # ============================================================
      - name: Author allowlist gate
        id: allowlist
        if: steps.author.outputs.proceed == 'true'
        env:
          ALLOWLIST: ${{ vars.CLAUDE_APPROVER_AUTHOR_ALLOWLIST }}
          AUTHOR: ${{ steps.author.outputs.login }}
        run: |
          set -e
          if [ -z "$ALLOWLIST" ]; then
            echo "::error::CLAUDE_APPROVER_AUTHOR_ALLOWLIST variable is unset;" \
              "install-claude-apps.zsh should have set it."
            exit 1
          fi
          allowed=$(printf '%s' "$ALLOWLIST" | jq --arg a "$AUTHOR" 'any(. == $a or . == "*")')
          if [ "$allowed" != "true" ]; then
            echo "::notice::Author '$AUTHOR' not on allowlist: $ALLOWLIST"
            exit 0
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

      # ============================================================
      # Gate 4: PR state (not draft, OPEN)
      # ============================================================
      - name: PR state gate
        id: state
        if: steps.allowlist.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          # `-R "$REPO"` is needed because no checkout has run yet — without
          # it, gh tries to resolve the repo from a local git context that
          # doesn't exist. See #203.
          state=$(gh pr view "$PR_NUMBER" -R "$REPO" --json isDraft,state)
          if [ "$(printf '%s' "$state" | jq -r .isDraft)" = "true" ]; then
            echo "::notice::PR is draft."; exit 0
          fi
          if [ "$(printf '%s' "$state" | jq -r .state)" != "OPEN" ]; then
            echo "::notice::PR not OPEN."; exit 0
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

      # ============================================================
      # Gate 5: wait for every other check, then require all-green +
      # HEAD SHA freeze. GitHub Actions has no cross-workflow ordering,
      # so the Approver sequences itself (#232): poll the head SHA's
      # check runs until everything else has completed (or a deadline
      # passes), then demand green. This is what makes the Approver
      # effectively run LAST. Finally verify the head SHA hasn't moved
      # during evaluation — protects against the race where a push lands
      # between the gate eval and the review post.
      # ============================================================
      - name: All-green check gate
        id: green
        if: steps.state.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          # `-R "$REPO"` is needed because no checkout has run yet — see #203.
          # The `gh api repos/...` calls below already use $REPO in the path.
          head_sha=$(gh pr view "$PR_NUMBER" -R "$REPO" --json headRefOid --jq .headRefOid)

          # Wait for every other check on the head SHA to complete:
          # 30-minute deadline, 30s poll. Giving up at the deadline is
          # safe — cancel-in-progress on the concurrency group means each
          # later trigger (the next check_suite completion) supersedes
          # this waiter and re-evaluates from scratch.
          deadline=$(( $(date +%s) + 1800 ))
          while :; do
            # Exclude this workflow's own jobs from the green computation
            # (#228): the gate job is always in_progress on this SHA and
            # the approve job is queued behind it, so counting either
            # would deadlock the wait.
            runs=$(gh api "repos/$REPO/commits/$head_sha/check-runs" --paginate \
                   --jq '.check_runs[]
                         | select(.name != "approve" and .name != "approver-gate")
                         | {name: .name, status: .status, conclusion: .conclusion}' \
                   | jq -s .)
            # Legacy commit-status API (third-party check posters). The
            # combined state reads 'pending' when zero statuses exist, so
            # only treat it as in-flight when there are actual statuses.
            status=$(gh api "repos/$REPO/commits/$head_sha/status" \
                     --jq '{state: .state, total: .total_count}')
            status_state=$(printf '%s' "$status" | jq -r .state)
            status_total=$(printf '%s' "$status" | jq -r .total)

            pending=$(printf '%s' "$runs" | jq 'map(select(.status != "completed")) | length')
            if [ "$pending" -eq 0 ] && { [ "$status_total" -eq 0 ] || [ "$status_state" != "pending" ]; }; then
              break
            fi

            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::notice::Still waiting on $pending check(s) (combined status: $status_state)" \
                "after 30 minutes — giving up; the next trigger re-evaluates."
              exit 0
            fi

            # If a push lands while we wait, the `synchronize` trigger
            # cancels this run via the concurrency group — no need to
            # re-resolve the head SHA inside the loop.
            echo "Waiting: $pending check(s) in progress, combined status '$status_state'" \
              "($status_total status(es)) on $head_sha."
            sleep 30
          done

          # Allow success + skipped + neutral; everything else is red.
          bad=$(printf '%s' "$runs" \
                | jq 'map(select(.conclusion != "success"
                                 and .conclusion != "neutral"
                                 and .conclusion != "skipped")) | length')
          if [ "$bad" -gt 0 ]; then
            echo "::notice::Some checks are not green on $head_sha — skipping" \
              "(the failing checks tell the story; an approve verdict would add noise):"
            printf '%s' "$runs" | jq '.[] | select(.conclusion != "success"
                                                    and .conclusion != "neutral"
                                                    and .conclusion != "skipped")'
            exit 0
          fi

          # Legacy commit statuses must be green when they exist — but
          # ADVISORY channels are excluded (#387). Snyk's `code/snyk` (SAST)
          # and `security/snyk` (Open Source) post via the legacy commit-status
          # API yet are never required branch-protection contexts (see
          # branch-protection.sh). On the free tier they can go ERROR for
          # quota reasons ("Code test limit reached") that say nothing about
          # this PR — and that must not silently skip the Approver. So evaluate
          # the remaining (non-advisory) statuses individually instead of
          # trusting the aggregate `state`, which any advisory red would taint.
          # Required legacy statuses (e.g. `sonarcloud`) are NOT excluded and
          # still gate as before.
          if [ "$status_total" -gt 0 ]; then
            status_full=$(gh api "repos/$REPO/commits/$head_sha/status")
            advisory='select(.context != "code/snyk" and (.context | startswith("security/snyk") | not))'
            bad_status=$(printf '%s' "$status_full" \
                         | jq "[.statuses[] | $advisory | select(.state != \"success\")] | length")
            if [ "$bad_status" -gt 0 ]; then
              echo "::notice::A non-advisory commit status is not 'success' on $head_sha — skipping:"
              printf '%s' "$status_full" \
                | jq ".statuses[] | $advisory | select(.state != \"success\") | {context, state}"
              exit 0
            fi
          fi

          # Final race check: head SHA must still be the SHA we evaluated.
          current_sha=$(gh pr view "$PR_NUMBER" -R "$REPO" --json headRefOid --jq .headRefOid)
          if [ "$head_sha" != "$current_sha" ]; then
            echo "::notice::Head SHA moved during gate eval ($head_sha → $current_sha);" \
              "skipping — the new push's triggers re-evaluate."
            exit 0
          fi

          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "proceed=true" >> "$GITHUB_OUTPUT"
          echo "::notice::All checks green on $head_sha — proceeding to Approver."

  # ==============================================================
  # Stage 2: run the Approver agent. Sequenced after the gate job via
  # `needs:` — the GitHub Actions equivalent of a pipeline stage. Shows
  # as "skipped" (not red) whenever the gate declined to proceed.
  # ==============================================================
  approve:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read   # needed for actions/checkout below
    steps:

      # ============================================================
      # Mint App token — actions/create-github-app-token auto-discovers
      # the installation ID for this repo from the client ID + private
      # key. v3.1.0 deprecated `app-id` in favor of `client-id` (#223);
      # GitHub's JWT auth accepts the numeric App ID as issuer, so the
      # existing CLAUDE_APPROVER_APP_ID variable works unchanged —
      # verified live on ai-doc-organizer. The private key must be
      # PKCS#8: v3 is WebCrypto-based and rejects PKCS#1 with
      # 'DataError: Invalid keyData' (install-claude-apps.zsh normalizes
      # on install — #234).
      # ============================================================
      - name: Mint Approver App token
        id: app_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.CLAUDE_APPROVER_APP_ID }}
          private-key: ${{ secrets.CLAUDE_APPROVER_PRIVATE_KEY }}

      # ============================================================
      # Checkout PR HEAD (with App token so any pushes from the agent
      # would be attributable to claude-approver[bot] — though the agent
      # is review-only and never pushes).
      # ============================================================
      - name: Checkout PR HEAD
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.gate.outputs.head_sha }}
          token: ${{ steps.app_token.outputs.token }}
          fetch-depth: 0

      # ============================================================
      # Pull in the Claude plugin family so the java-approver
      # agent is loadable. The bootstrap renders the repo + ref from
      # timo-jakob/timos-claude-code-plugins / f34c8b5420fc3b4658bc36b5cbcc39ff1c7c30c0; defaults pin
      # the canonical fork.
      # ============================================================
      - name: Checkout Claude plugin family
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: "timo-jakob/timos-claude-code-plugins"
          ref: "f34c8b5420fc3b4658bc36b5cbcc39ff1c7c30c0"
          path: .claude-plugins
          token: ${{ secrets.GITHUB_TOKEN }}

      # ============================================================
      # Install Claude Code CLI.
      # TODO (Phase 3): pin to a specific Claude Code version once the # NOSONAR: tracked work item; CLI does not yet ship versioned releases or checksums
      # CLI ships versioned releases; finalise the install URL against
      # what the approver agent's testing actually uses.
      # ============================================================
      - name: Install Claude Code
        run: |
          set -e
          curl -fsSL https://claude.ai/install.sh | bash # NOSONAR: official Anthropic installer over HTTPS; no checksum provided by upstream yet (see TODO above)
          # Add common install locations to PATH; first match wins.
          for d in "$HOME/.local/bin" "$HOME/.claude/bin" "$HOME/.npm-global/bin"; do
            if [ -x "$d/claude" ]; then
              echo "$d" >> "$GITHUB_PATH"
              break
            fi
          done
          # Sanity check.
          PATH="$HOME/.local/bin:$HOME/.claude/bin:$HOME/.npm-global/bin:$PATH" \
            claude --version || { echo "::error::claude CLI install failed"; exit 1; }

      # ============================================================
      # Run the Approver agent.
      # The agent reads .claude/approver-policy.md from the checked-out
      # PR, evaluates the diff + check runs, fetches any API-stability
      # artifact (when present), runs cheap local checks, builds a risk
      # register, calibrates confidence, and posts the review using the
      # App token in GH_TOKEN. Its stdout is the human-readable summary;
      # the hidden JSON block for /development:maintenance re-ingest is
      # appended by the agent itself. See
      # development-java/agents/java-approver.md
      # for the full contract.
      # ============================================================
      - name: Run Claude Approver
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ needs.gate.outputs.number }}
          REPO: ${{ github.repository }}
          DRY_RUN: ${{ needs.gate.outputs.dry_run }}
        run: |
          set -e
          # --allowedTools is required (#236): headless `claude --print`
          # gates Bash behind interactive approval by default, so without
          # it every `gh` call inside the agent is denied and the review
          # never posts. The runner is an ephemeral sandbox and GH_TOKEN
          # is the repo-scoped App token, so auto-approving Bash here is
          # appropriate; no Write/Edit — the agent is review-only.
          claude --print \
            --allowedTools "Bash,Read,Grep,Glob" \
            --plugin-dir ".claude-plugins/development" \
            --plugin-dir ".claude-plugins/development-java" \
            --agent java-approver \
            -- \
            "Review PR #${PR_NUMBER} in ${REPO}. Dry-run: ${DRY_RUN:-false}."
