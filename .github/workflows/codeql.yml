# (do not edit this line; the maintenance pipeline uses it for drift detection — see #213)
# CodeQL — GitHub-native SAST, free for public repos. The primary SAST
# signal consumed by /development:maintenance via the Code Scanning API.
# Sonar adds a second opinion. Snyk's GitHub App also posts a SAST PR
# check (advisory only — not gathered by the maintenance pipeline).

name: CodeQL

on:
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - "docs/**"
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - "docs/**"
  schedule:
    - cron: "0 6 * * 1"   # weekly Monday 06:00 UTC — drift detection
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Languages auto-filled by bootstrap. CodeQL supports:
        # cpp, csharp, go, java, javascript, python, ruby, swift
        language: [java]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      - uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: "/language:${{ matrix.language }}"
